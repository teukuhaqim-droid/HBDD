<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ulang Tahun Naia</title>
<style>
  body {
    margin: 0;
    padding: 0;
    height: 100vh;
    overflow: hidden;
    background-image: url('taman.jpg');
    background-size: cover;
    background-position: center;
    font-family: 'Comic Sans MS', 'Quicksand', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #ffe6f2;
  }
  .overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(255, 240, 245, 0.3);
    z-index: 1;
  }
  .elemen-lucu {
    position: absolute;
    z-index: 2;
    pointer-events: none;
    opacity: 0.9;
  }
  .animasi-rotasi {
    animation: mengapungRotasi linear infinite;
  }
  .animasi-lurus {
    animation: mengapungLurus linear infinite;
  }
  @keyframes mengapungRotasi {
    0% { transform: translateY(110vh) rotate(0deg) scale(0.8); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-10vh) rotate(360deg) scale(1.2); opacity: 0; }
  }
  @keyframes mengapungLurus {
    0% { transform: translateY(110vh) rotate(0deg) scale(0.8); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-10vh) rotate(0deg) scale(1.2); opacity: 0; }
  }
  #surat {
    font-size: 100px;
    cursor: pointer;
    z-index: 10;
    animation: goyangKenyal 2s infinite;
    user-select: none;
  }
  @keyframes goyangKenyal {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15) translateY(-15px); }
  }
  .polaroid {
    display: none;
    position: absolute;
    width: 110px;
    height: 140px;
    background: #ffffff;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ffb6c1;
    box-shadow: 0 8px 20px rgba(255, 182, 193, 0.5);
    cursor: pointer;
    z-index: 15;
    transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    animation: melayangLembut 3s infinite alternate ease-in-out;
  }
  .polaroid img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 6px;
  }
  @keyframes melayangLembut {
    from { transform: translateY(0) rotate(-2deg); }
    to { transform: translateY(-15px) rotate(2deg); }
  }
  .polaroid.muncul {
    display: block;
    animation: popMasuk 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
  }
  .polaroid.diperbesar {
    top: 50% !important;
    left: 50% !important;
    transform: translate(-50%, -50%) scale(2.2) rotate(0deg) !important;
    z-index: 50;
    box-shadow: 0 15px 35px rgba(255, 182, 193, 0.6);
    border: 2px solid #ffb6c1;
    background: #ffffff;
    animation: none;
  }
  .polaroid.hilang {
    transform: scale(0) rotate(180deg) !important;
    opacity: 0;
  }
  @keyframes popMasuk {
    0% { transform: scale(0); }
    100% { transform: scale(1); }
  }
  .p1 { top: 12%; left: 10%; }
  .p2 { top: 18%; left: 72%; animation-delay: 0.2s; }
  .p3 { top: 50%; left: 8%; animation-delay: 0.4s; }
  .p4 { top: 55%; left: 75%; animation-delay: 0.6s; }
  .p5 { top: 8%; left: 42%; animation-delay: 0.8s; }
  .p6 { top: 72%; left: 42%; animation-delay: 1s; }
  
  #kejutan {
    display: none;
    text-align: center;
    z-index: 40;
    background: white;
    padding: 40px 30px;
    border-radius: 35px;
    box-shadow: 0 15px 40px rgba(255, 105, 180, 0.3);
    max-width: 400px;
    width: 85%;
    border: 2px solid #ffb6c1;
  }
  .tampil {
    display: block !important;
    animation: popKenyal 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
  }
  @keyframes popKenyal {
    0% { transform: scale(0); }
    80% { transform: scale(1.05); }
    100% { transform: scale(1); }
  }
  h1 {
    color: #ff69b4;
    margin: 0 0 10px 0;
    font-size: 26px;
    font-weight: bold;
  }
  .nama {
    color: #ff1493;
    font-size: 22px;
    font-weight: bold;
    margin: 0 0 20px 0;
    background: #fff0f5;
    display: inline-block;
    padding: 8px 20px;
    border-radius: 25px;
  }
  .doa {
    color: #db7093;
    font-size: 16px;
    margin: 0;
    line-height: 1.6;
  }
  #petunjuk {
    position: absolute;
    bottom: 30px;
    color: #ff1493;
    font-size: 16px;
    font-weight: bold;
    background: rgba(255,255,255,0.9);
    padding: 12px 25px;
    border-radius: 30px;
    z-index: 20;
    display: none;
    box-shadow: 0 5px 15px rgba(255, 182, 193, 0.5);
  }
</style>
</head>
<body>

<div class="overlay"></div>
<audio id="musikLatar" src="lagu.mp3" loop></audio>
<div id="surat" onclick="bukaSurat()">💌</div>
<div id="petunjuk">Pencet semua fotonya yaa 💕</div>

<div class="polaroid p1" onclick="lihatFoto(this)">
  <img src="foto1.jpg" alt="Foto 1">
</div>
<div class="polaroid p2" onclick="lihatFoto(this)">
  <img src="foto2.jpg" alt="Foto 2">
</div>
<div class="polaroid p3" onclick="lihatFoto(this)">
  <img src="foto3.jpg" alt="Foto 3">
</div>
<div class="polaroid p4" onclick="lihatFoto(this)">
  <img src="foto4.jpg" alt="Foto 4">
</div>
<div class="polaroid p5" onclick="lihatFoto(this)">
  <img src="foto5.jpg" alt="Foto 5">
</div>
<div class="polaroid p6" onclick="lihatFoto(this)">
  <img src="foto6.jpg" alt="Foto 6">
</div>

<div id="kejutan">
  <h1>Selamat Ulang Tahun🎉</h1>
  <div class="nama">Naia Mauzi Ananda Afi💞</div>
  <div class="doa">Selamat Ulang tahunin ayanggg💕, semoga setiap langkah ayang selalu dipenuhi kesehatan, kebahagiaan, dan kemudahan rezeki ❤️. Semoga kedepannya sukses terus, dan kalau ada rintangannya harus kuat. Lopyuuu 💕🥰❤️</div>
</div>

<script>
  let posisiX = 0;
  let intervalItem;
  
  function buatElemenLucu() {
    const elemen = document.createElement('img');
    const gambar = ['item1.png', 'item2.png', 'item3.png', 'item4.png', 'item5.png'];
    elemen.src = gambar[Math.floor(Math.random() * gambar.length)];
    
    const berputar = Math.random() > 0.5;
    if (berputar) {
      elemen.className = 'elemen-lucu animasi-rotasi';
    } else {
      elemen.className = 'elemen-lucu animasi-lurus';
    }
    
    const rentangPenyebaran = [5, 25, 45, 65, 85];
    const posisiAcakX = rentangPenyebaran[posisiX] + (Math.random() * 10);
    
    posisiX++;
    if (posisiX >= rentangPenyebaran.length) {
      posisiX = 0;
    }
    
    elemen.style.left = posisiAcakX + 'vw';
    elemen.style.animationDuration = Math.random() * 4 + 4 + 's';
    
    const ukuranAcak = Math.random() * 40 + 60;
    elemen.style.width = ukuranAcak + 'px';
    
    document.body.appendChild(elemen);
    setTimeout(() => elemen.remove(), 9000);
  }
  
  intervalItem = setInterval(buatElemenLucu, 500);

  let fotoDilihat = 0;
  const totalFoto = 6;

  function bukaSurat() {
    document.getElementById('surat').style.display = 'none';
    document.getElementById('petunjuk').style.display = 'block';
    document.getElementById('musikLatar').play();
    
    document.querySelectorAll('.polaroid').forEach(foto => {
      foto.classList.add('muncul');
    });
  }

  function lihatFoto(elemen) {
    if (!elemen.classList.contains('selesai')) {
      elemen.classList.add('selesai');
      elemen.classList.add('diperbesar');
      
      setTimeout(() => {
        elemen.classList.remove('diperbesar');
        elemen.classList.add('hilang');
        fotoDilihat++;
        
        setTimeout(() => {
          elemen.style.display = 'none';
          
          if (fotoDilihat === totalFoto) {
            document.getElementById('petunjuk').style.display = 'none';
            setTimeout(munculKejutan, 400);
          }
        }, 500);
      }, 2000);
    }
  }

  function munculKejutan() {
    document.getElementById('kejutan').classList.add('tampil');
    clearInterval(intervalItem);
    intervalItem = setInterval(buatElemenLucu, 150);
  }
</script>

</body>
</html>
